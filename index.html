<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JJK — текстовый бой</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;600;800&family=Syne:wght@700;800&family=Unbounded:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #030308;
      --bg-mid: #0a0a12;
      --panel: rgba(14, 14, 22, 0.78);
      --panel-solid: #0e0e16;
      --border: rgba(130, 130, 175, 0.22);
      --border-bright: rgba(190, 200, 255, 0.42);
      --text: #f4f2f8;
      --muted: #9a97a8;
      --accent: #f43f5e;
      --accent-glow: rgba(244, 63, 94, 0.5);
      --accent2: #22d3ee;
      --accent2-glow: rgba(34, 211, 238, 0.45);
      --curse: #c084fc;
      --curse-glow: rgba(192, 132, 252, 0.42);
      --win: #4ade80;
      --gold: #fbbf24;
      --glass-top: rgba(255, 255, 255, 0.09);
      --glass-edge: rgba(255, 255, 255, 0.04);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --radius-panel: 18px;
      --shadow-elev: 0 24px 64px -20px rgba(0, 0, 0, 0.75);
    }
    * { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
      color-scheme: dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, var(--bg-mid) 0%, var(--bg) 55%);
      color: var(--text);
      position: relative;
      overflow-x: hidden;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }
    ::selection {
      background: rgba(168, 85, 247, 0.35);
      color: #fff;
    }
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .ambient__orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: orbFloat 18s var(--ease-out) infinite;
    }
    .ambient__orb--1 {
      width: min(90vw, 520px);
      height: min(90vw, 520px);
      background: radial-gradient(circle, rgba(225, 29, 72, 0.5) 0%, transparent 70%);
      top: -15%;
      left: -20%;
      animation-delay: 0s;
    }
    .ambient__orb--2 {
      width: min(70vw, 420px);
      height: min(70vw, 420px);
      background: radial-gradient(circle, rgba(56, 189, 248, 0.45) 0%, transparent 68%);
      bottom: -10%;
      right: -15%;
      animation-delay: -6s;
      animation-duration: 22s;
    }
    .ambient__orb--3 {
      width: min(50vw, 320px);
      height: min(50vw, 320px);
      background: radial-gradient(circle, rgba(168, 85, 247, 0.38) 0%, transparent 65%);
      top: 40%;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: -12s;
      animation-duration: 25s;
      opacity: 0.45;
    }
    .ambient__orb--4 {
      width: min(60vw, 380px);
      height: min(60vw, 380px);
      background: radial-gradient(circle, rgba(251, 191, 36, 0.12) 0%, transparent 62%);
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: -8s;
      animation-duration: 28s;
      opacity: 0.5;
      filter: blur(72px);
    }
    .ambient__mesh {
      position: absolute;
      inset: -30%;
      opacity: 0.35;
      background:
        conic-gradient(from 120deg at 30% 40%, rgba(56, 189, 248, 0.08), transparent 40%, rgba(168, 85, 247, 0.07), transparent 75%, rgba(225, 29, 72, 0.06));
      animation: meshSpin 48s linear infinite;
      pointer-events: none;
    }
    @keyframes meshSpin {
      to { transform: rotate(360deg); }
    }
    .ambient__sparkles {
      position: absolute;
      inset: 0;
      opacity: 0.22;
      background-image:
        radial-gradient(1.2px 1.2px at 12% 18%, rgba(255, 255, 255, 0.55), transparent),
        radial-gradient(1px 1px at 88% 42%, rgba(200, 220, 255, 0.4), transparent),
        radial-gradient(1px 1px at 35% 72%, rgba(255, 255, 255, 0.35), transparent),
        radial-gradient(1.2px 1.2px at 62% 28%, rgba(168, 85, 247, 0.45), transparent),
        radial-gradient(1px 1px at 78% 85%, rgba(56, 189, 248, 0.4), transparent),
        radial-gradient(1px 1px at 22% 55%, rgba(255, 255, 255, 0.3), transparent);
      background-size: 100% 100%;
      animation: sparkleDrift 22s ease-in-out infinite;
      mix-blend-mode: screen;
      pointer-events: none;
    }
    @keyframes sparkleDrift {
      0%, 100% { opacity: 0.18; transform: translate(0, 0) scale(1); }
      50% { opacity: 0.28; transform: translate(-1.5%, 1%) scale(1.02); }
    }
    .ambient__grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 75% 65% at 50% 38%, black 18%, transparent 78%);
      opacity: 0.42;
    }
    .ambient__vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 85% 70% at 50% 45%, transparent 0%, rgba(0, 0, 0, 0.75) 100%);
    }
    .ambient__grain {
      position: absolute;
      inset: -50%;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: grainShift 8s steps(10) infinite;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(4%, 6%) scale(1.05); }
      66% { transform: translate(-3%, 3%) scale(0.95); }
    }
    @keyframes grainShift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-2%, 1%); }
    }
    .fx-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s ease-out;
      mix-blend-mode: screen;
    }
    .fx-overlay.is-crit {
      opacity: 1;
      mix-blend-mode: normal;
      background:
        radial-gradient(circle at 50% 45%, rgba(251, 191, 36, 0.55) 0%, transparent 42%),
        radial-gradient(circle at 30% 60%, rgba(255, 237, 160, 0.2) 0%, transparent 50%),
        repeating-conic-gradient(from 0deg, transparent 0deg 8deg, rgba(251, 191, 36, 0.04) 8deg 10deg);
      animation: fxCritPulse 0.52s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }
    .fx-overlay.is-domain {
      opacity: 1;
      mix-blend-mode: screen;
      background:
        radial-gradient(ellipse 110% 85% at 50% 48%, rgba(168, 85, 247, 0.45) 0%, rgba(88, 28, 135, 0.15) 38%, transparent 68%),
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(225, 29, 72, 0.18) 0%, transparent 55%),
        conic-gradient(from 200deg at 50% 50%, transparent, rgba(192, 132, 252, 0.12), transparent);
      animation: fxDomainPulse 0.62s var(--ease-out) forwards;
    }
    .fx-overlay.is-hit-p1 {
      opacity: 1;
      mix-blend-mode: screen;
      background:
        linear-gradient(100deg, transparent 0%, rgba(34, 211, 238, 0.35) 28%, rgba(56, 189, 248, 0.12) 45%, transparent 72%),
        linear-gradient(90deg, rgba(14, 165, 233, 0.08) 0%, transparent 40%);
      animation: fxHitFlash 0.38s ease-out forwards;
    }
    .fx-overlay.is-hit-p2 {
      opacity: 1;
      mix-blend-mode: screen;
      background:
        linear-gradient(260deg, transparent 0%, rgba(244, 63, 94, 0.38) 30%, rgba(225, 29, 72, 0.1) 48%, transparent 70%),
        linear-gradient(270deg, rgba(190, 18, 60, 0.1) 0%, transparent 42%);
      animation: fxHitFlash 0.38s ease-out forwards;
    }
    @keyframes fxCritPulse {
      0% { opacity: 0; filter: brightness(1.4) saturate(1.3); }
      25% { opacity: 1; filter: brightness(1.15) saturate(1.15); }
      100% { opacity: 0; filter: brightness(1); }
    }
    @keyframes fxDomainPulse {
      0% { opacity: 0; transform: scale(1.08); filter: blur(6px) saturate(1.4); }
      35% { opacity: 1; filter: blur(0) saturate(1.2); }
      100% { opacity: 0; transform: scale(1); filter: blur(0); }
    }
    @keyframes fxHitFlash {
      0% { opacity: 0.95; }
      100% { opacity: 0; }
    }
    .domain-modal {
      position: fixed;
      inset: 0;
      z-index: 180;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: radial-gradient(ellipse 90% 80% at 50% 40%, rgba(20, 10, 40, 0.45), rgba(2, 2, 10, 0.92));
      backdrop-filter: blur(14px) saturate(1.2);
      -webkit-backdrop-filter: blur(14px) saturate(1.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .domain-modal.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .domain-modal__panel {
      max-width: 26rem;
      width: 100%;
      max-height: min(88vh, 32rem);
      overflow-y: auto;
      padding: 1.25rem 1.2rem 1.3rem;
      border-radius: 16px;
      border: 1px solid rgba(192, 132, 252, 0.45);
      background: linear-gradient(165deg, rgba(42, 26, 68, 0.98), rgba(8, 8, 18, 0.99));
      box-shadow: 0 0 56px rgba(139, 92, 246, 0.35), 0 24px 64px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .domain-modal h3 {
      font-family: "Syne", "Outfit", sans-serif;
      font-size: 1.02rem;
      font-weight: 800;
      margin: 0 0 0.35rem;
      letter-spacing: 0.02em;
      line-height: 1.25;
      color: #e9d5ff;
    }
    .domain-modal .dm-step {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(251, 191, 36, 0.85);
      font-weight: 700;
      margin: 0 0 0.5rem;
    }
    .domain-modal .dm-text {
      font-size: 0.88rem;
      line-height: 1.45;
      margin: 0 0 1rem;
      color: var(--text);
    }
    .domain-modal .dm-btns {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .domain-modal .dm-btn {
      font: inherit;
      cursor: pointer;
      padding: 0.62rem 0.75rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      text-align: left;
      font-size: 0.84rem;
      line-height: 1.35;
      transition: border-color 0.15s, background 0.15s;
    }
    .domain-modal .dm-btn:hover:not(:disabled) {
      border-color: rgba(168, 85, 247, 0.55);
      background: rgba(168, 85, 247, 0.1);
    }
    .domain-modal .dm-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .maho-cutscene {
      position: fixed;
      inset: 0;
      z-index: 165;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      background: radial-gradient(ellipse 90% 70% at 50% 40%, rgba(30, 15, 45, 0.97), rgba(2, 2, 10, 0.96));
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .maho-cutscene.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .maho-cutscene__inner {
      max-width: 28rem;
      width: 100%;
      text-align: center;
    }
    .maho-cutscene__wheel {
      font-size: clamp(2.8rem, 10vw, 4.2rem);
      line-height: 1;
      margin: 0 auto 1.35rem;
      display: block;
      width: fit-content;
      animation: mahoWheelSpin 3.2s linear infinite;
      filter: drop-shadow(0 0 18px rgba(251, 191, 36, 0.5)) drop-shadow(0 0 28px rgba(168, 85, 247, 0.35));
      user-select: none;
    }
    @keyframes mahoWheelSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .maho-cutscene__text {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      color: rgba(245, 240, 255, 0.92);
      text-align: left;
      min-height: 6rem;
      margin-bottom: 1.25rem;
    }
    .maho-cutscene__line {
      margin: 0 0 0.65rem;
      padding: 0.35rem 0;
      border-left: 2px solid rgba(251, 191, 36, 0.45);
      padding-left: 0.75rem;
      animation: mahoLineIn 0.45s var(--ease-out) both;
    }
    @keyframes mahoLineIn {
      from {
        opacity: 0;
        transform: translateX(-8px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    .maho-cutscene__btn {
      font-family: inherit;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      padding: 0.65rem 1.4rem;
      border-radius: 10px;
      border: 1px solid rgba(251, 191, 36, 0.55);
      background: linear-gradient(165deg, rgba(80, 50, 30, 0.5), rgba(18, 14, 28, 0.95));
      color: #fef3c7;
      box-shadow: 0 0 24px rgba(251, 191, 36, 0.15);
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.2s;
    }
    .maho-cutscene__btn:hover {
      border-color: rgba(253, 224, 71, 0.85);
      box-shadow: 0 0 28px rgba(251, 191, 36, 0.28);
      transform: translateY(-1px);
    }

    body.is-shake {
      animation: screenShake 0.48s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }
    @keyframes screenShake {
      0%, 100% { transform: translate(0, 0); }
      15% { transform: translate(-5px, 3px); }
      30% { transform: translate(5px, -3px); }
      45% { transform: translate(-4px, -2px); }
      60% { transform: translate(4px, 2px); }
      75% { transform: translate(-2px, 1px); }
    }
    .wrap {
      position: relative;
      z-index: 1;
      max-width: min(960px, 100%);
      margin: 0 auto;
      padding: 1.65rem clamp(0.9rem, 3.2vw, 1.5rem) 3.25rem;
    }
    .title-block {
      text-align: center;
      margin-bottom: 1.65rem;
      position: relative;
    }
    .title-block::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -0.5rem;
      transform: translateX(-50%);
      width: min(420px, 88vw);
      height: 140px;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(56, 189, 248, 0.12), transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
    h1 {
      font-family: "Syne", "Outfit", sans-serif;
      font-size: clamp(1.4rem, 4.8vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      margin: 0 0 0.5rem;
      line-height: 1.15;
      background: linear-gradient(115deg, #ffffff 0%, #a5f3fc 22%, #e879f9 48%, #fda4af 72%, #fef08a 100%);
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: titleShine 7s ease-in-out infinite;
      filter: drop-shadow(0 0 28px rgba(34, 211, 238, 0.3)) drop-shadow(0 0 22px rgba(244, 63, 94, 0.22));
    }
    @keyframes titleShine {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 100% center; }
    }

      text-transform: uppercase;
      color: rgba(139, 136, 152, 0.92);

    .sub {
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.55;
      max-width: 30rem;
      margin: 0 auto;
      text-wrap: balance;
    }
    .panel {
      position: relative;
      background: linear-gradient(165deg, rgba(22, 22, 34, 0.82) 0%, rgba(12, 12, 20, 0.72) 100%);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border: 1px solid var(--border);
      border-radius: var(--radius-panel);
      padding: 1.4rem 1.3rem;
      margin-bottom: 1.1rem;
      box-shadow:
        0 0 0 1px var(--glass-edge) inset,
        0 1px 0 var(--glass-top) inset,
        var(--shadow-elev),
        0 0 100px -36px rgba(34, 211, 238, 0.18),
        0 0 90px -40px rgba(168, 85, 247, 0.12);
    }
    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(145deg, rgba(56, 189, 248, 0.22), transparent 40%, transparent 60%, rgba(244, 63, 94, 0.15));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.65;
    }
    #setup.panel--setup {
      padding: 1.45rem clamp(1rem, 2.5vw, 1.5rem) 1.55rem;
    }
    .roster-filter-bar {
      margin-bottom: 1.1rem;
      padding: 0.8rem 0.9rem 0.95rem;
      border-radius: 14px;
      border: 1px solid rgba(130, 130, 175, 0.2);
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.28), rgba(8, 8, 16, 0.35));
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.03) inset, 0 12px 40px -24px rgba(0, 0, 0, 0.5);
    }
    .roster-filter-bar__row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.65rem;
    }
    .filter-toggle-btn {
      font-family: inherit;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.45rem 0.85rem;
      border-radius: 10px;
      border: 1px solid rgba(56, 189, 248, 0.35);
      background: linear-gradient(165deg, rgba(30, 40, 55, 0.9), rgba(12, 14, 22, 0.95));
      color: var(--text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .filter-toggle-btn:hover {
      border-color: rgba(56, 189, 248, 0.55);
      box-shadow: 0 0 16px rgba(56, 189, 248, 0.12);
    }
    .filter-toggle-btn.is-open {
      border-color: rgba(168, 85, 247, 0.55);
      box-shadow: 0 0 18px rgba(168, 85, 247, 0.2);
    }
    .filter-toggle-btn.has-filters::after {
      content: " ·";
      color: var(--accent2);
    }
    .roster-filter-panel {
      display: none;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      flex-direction: column;
      gap: 0.65rem;
    }
    .roster-filter-panel.is-open {
      display: flex;
    }
    .roster-filter-panel__search {
      width: 100%;
      max-width: 22rem;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.5rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(10, 10, 18, 0.9);
      color: var(--text);
    }
    .roster-filter-panel__search::placeholder {
      color: var(--muted);
    }
    .filter-tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .filter-chip {
      font-family: inherit;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      border: 1px solid rgba(120, 120, 160, 0.35);
      background: rgba(22, 22, 34, 0.85);
      color: rgba(240, 238, 245, 0.88);
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    .filter-chip:hover {
      border-color: rgba(168, 85, 247, 0.45);
    }
    .filter-chip.is-on {
      border-color: rgba(168, 85, 247, 0.65);
      background: linear-gradient(165deg, rgba(60, 40, 90, 0.45), rgba(18, 18, 28, 0.95));
      color: #fff;
    }
    .filter-clear-btn {
      font-family: inherit;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.35rem 0.55rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: transparent;
      color: var(--muted);
      align-self: flex-start;
    }
    .filter-clear-btn:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .setup-teams {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.15rem 1.25rem;
      margin-bottom: 1.35rem;
      align-items: stretch;
    }
    @media (max-width: 720px) {
      .setup-teams {
        grid-template-columns: 1fr;
      }
    }
    .setup-team {
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 1rem 0.9rem 1.05rem;
      border-radius: 15px;
      border: 1px solid var(--border);
      background: linear-gradient(165deg, rgba(14, 14, 26, 0.72), rgba(6, 6, 14, 0.88));
    }
    .setup-team--p1 {
      border-color: rgba(34, 211, 238, 0.32);
      box-shadow:
        0 0 0 1px rgba(34, 211, 238, 0.08) inset,
        0 16px 44px -20px rgba(34, 211, 238, 0.2);

    .setup-team--p2 {
      border-color: rgba(244, 63, 94, 0.32);
      box-shadow:
        0 0 0 1px rgba(244, 63, 94, 0.08) inset,
        0 16px 44px -20px rgba(244, 63, 94, 0.18);
    }
    .setup-team__head {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 800;
      color: var(--muted);
      margin: 0 0 0.7rem;
      padding-bottom: 0.55rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      line-height: 1.35;
    }
    .setup-team__head span {
      display: inline-block;
      margin-left: 0.35rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      opacity: 0.88;
      color: rgba(255, 255, 255, 0.55);
    }
    .setup-team .roster {
      flex: 1;
      align-content: start;
      grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
      gap: 0.5rem;
    }
    .setup-footer {
      margin-top: 0.25rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
      gap: 1.1rem;

    .setup-diff__head {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin: 0 0 0.65rem;

    .setup-cta {

      margin-top: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .setup-diff-block {
      margin: 0;
      padding: 0.85rem 0.75rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(120, 120, 160, 0.12);
      background: rgba(0, 0, 0, 0.18);
    }

      margin: 0;
    }
    #battle.panel {
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 24px 60px -24px rgba(0, 0, 0, 0.7),

    }
    .panel h2 {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin: 0 0 0.85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

      content: "";

      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);

    .roster {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 0.55rem;
      align-items: stretch;
    }
    .char-btn {
      display: flex;
      flex-direction: column;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      box-sizing: border-box;
      width: 100%;
      min-height: 7.5rem;
      height: 100%;

  <script>

    function pick(arr) {

    function weightedPick(weights) {
      const total = weights.reduce((s, x) => s + x.w, 0);
      let r = Math.random() * total;
      for (let i = 0; i < weights.length; i++) {
        if (r < weights[i].w) return weights[i].act;
        r -= weights[i].w;
      }
      return weights[weights.length - 1].act;
    }

      },
      {

        name: "Ненависть по существу",

      },
    ];

    /** Счётчики и флаги одного боя (синергии и механики без «голых» множителей). */
    let battleState = {};

    function resetBattleState() {
      battleState = {
        globalTurn: 0,
        skipEnemyTurn: false,
        forceEnemyStrikeNext: false,
        enemyDamageFactor: 1,
        ritualDomainUsed: false,
        domainRerollUsed: false,
        pierceDefendUsed: false,
        curseMarkActive: false,
        weakMarkFromSynergy: false,
        tokyoCoverUsed: false,
        strikeCountP1: 0,
        techCountP1: 0,
        raidArmorActive: false,
        tagStrikeBonus: 0,
        lastPlayerAct: null,
        lastSynergyFx: [],
        shadowVesselUsed: false,
        shadowVesselEnemyUsed: false,
        nextEnemyOutgoingFactor: 1,
        nextPlayerOutgoingFactor: 1,
        skipPlayerTurn: false,
        forcePlayerStrikeNext: false,
        tagEnemyStrikeBonus: 0,
        tokyoCoverEnemyUsed: false,
        ritualDomainEnemyUsed: false,
        domainRerollEnemyUsed: false,
        raidArmorEnemyActive: false,
        yujiStrikes: 0,
        yujiEnemyStrikes: 0,
        playerMoves: 0,
        enemyMoves: 0,
      };
    }

    function neutralSynergy() {
      return {
        strike: 1,
        tech: 1,
        domainDmg: 1,
        crit: 0,
        domainCh: 0,
        defEx: 0,
        active: [],
        fx: [],
      };
    }

    function findSynergyMatches(teamIds) {
      const set = new Set(teamIds);
      return TEAM_SYNERGIES.filter((syn) => {
        if (!syn.ids.every((id) => set.has(id))) return false;
        if (syn.ids.length >= 3 && teamIds.length < 3) return false;
        return true;
      });
    }

    function mergeSynergies(matches) {
      const o = neutralSynergy();
      for (const m of matches) {
        o.active.push(m);
        if (m.fx && m.fx.length) o.fx.push(...m.fx);
      }
      return o;
    }

    function rollInt(min, max) {
      return min + Math.floor(Math.random() * (max - min + 1));
    }

    function synergyFxListSummary(syn) {
      if (!syn.active.length) return "—";
      const hints = syn.active.map((m) => m.combatHint || m.blurb).filter(Boolean);
      return hints.length ? hints.join(" · ") : syn.active.map((m) => m.name).join(" · ");
    }

    function formatSynergyStatBits(syn) {
      if (!syn.active.length) return "нет связок";
      return synergyFxListSummary(syn);
    }

    function synergyActNote() {
      return "";
    }

    function runSynergyHooksPlayerAfterDamage(act, baseDmg) {
      if (!synergyP1.fx || !synergyP1.fx.length) return;
      for (const fx of synergyP1.fx) {
        if (fx.kind === "skip_enemy_turn" && fx.acts && fx.acts.includes(act)) {
          if (synergyRollSuccess(fx.chance, "p1")) {
            battleState.skipEnemyTurn = true;
            appendLog(
              `✦ <strong>Синергия (Буги-вуги):</strong> хлопок сбивает темп — <strong>противник пропускает ход</strong>.`,
              "synergy",
            );
          }
        }
        if (fx.kind === "blood_bleed_after_tech" && act === "technique") {
          if (synergyRollSuccess(fx.chance, "p1")) {
            const ex = rollInt(fx.min, fx.max);
            hp2 = Math.max(0, hp2 - ex);
            appendLog(`✦ <strong>Синергия (кровь):</strong> кровяной след добивает ещё на <strong>${ex}</strong>.`, "synergy");
            updateHpBars();
          }
        }
        if (fx.kind === "zenin_extra_strike" && act === "strike") {
          if (synergyRollSuccess(fx.chance, "p1")) {
            const ex = rollInt(fx.min, fx.max);
            hp2 = Math.max(0, hp2 - ex);
            appendLog(`✦ <strong>Синергия (Зенин):</strong> клановый нажим — дополнительно <strong>${ex}</strong>.`, "synergy");
            updateHpBars();
          }
        }
        if (fx.kind === "force_enemy_strike" && (act === "strike" || act === "technique")) {
          if (synergyRollSuccess(fx.chance, "p1")) {
            battleState.forceEnemyStrikeNext = true;
            appendLog(`✦ <strong>Синергия (зал/сцена):</strong> враг вынужден ответить только <strong>ударом</strong> в следующий раз.`, "synergy");
          }
        }
        if (fx.kind === "mark_enemy_weak" && act === "strike") {
          if (synergyRollSuccess(fx.chance, "p1")) {
            battleState.nextEnemyOutgoingFactor = Math.min(battleState.nextEnemyOutgoingFactor, fx.nextFactor);
            appendLog(`✦ <strong>Синергия (метка):</strong> следующий удар врага по тебе ослаблен.`, "synergy");
          }
        }
        if (fx.kind === "double_tap_strike" && act === "strike") {
          if (synergyRollSuccess(fx.chance, "p1")) {
            const ex = Math.max(1, Math.floor(baseDmg * fx.frac));
            hp2 = Math.max(0, hp2 - ex);
            appendLog(`✦ <strong>Синергия (смена):</strong> второй заход в связке — ещё <strong>${ex}</strong>.`, "synergy");
            updateHpBars();
          }
        }
        if (fx.kind === "shadow_vessel" && act === "strike" && fx.once && !battleState.shadowVesselUsed) {
          battleState.shadowVesselUsed = true;
          const ex = Math.max(1, Math.floor(baseDmg * fx.frac));
          hp2 = Math.max(0, hp2 - ex);
          appendLog(`✦ <strong>Синергия (сосуд/тени):</strong> тень добивает ещё <strong>${ex}</strong>.`, "synergy");
          updateHpBars();
        }
      }
    }

    /** Зеркальные эффекты связок команды врага после урона по игроку. */
    function runSynergyHooksEnemyAfterDamage(act, baseDmg) {
      if (!synergyP2.fx || !synergyP2.fx.length) return;
      for (const fx of synergyP2.fx) {
        if (fx.kind === "skip_enemy_turn" && fx.acts && fx.acts.includes(act)) {
          if (synergyRollSuccess(fx.chance, "p2")) {
            battleState.skipPlayerTurn = true;

              `✦ <strong>Синергия (враг, Буги-вуги):</strong> ритм ломается — <strong>ты пропускаешь ход</strong>.`,

            );
          }
        }
        if (fx.kind === "blood_bleed_after_tech" && act === "technique") {
          if (synergyRollSuccess(fx.chance, "p2")) {
            const ex = rollInt(fx.min, fx.max);
            hp1 = Math.max(0, hp1 - ex);
            appendLog(`✦ <strong>Синергия (враг, кровь):</strong> добой по следу — ещё <strong>${ex}</strong>.`, "synergy");
            updateHpBars();
          }
        }
        if (fx.kind === "zenin_extra_strike" && act === "strike") {
          if (synergyRollSuccess(fx.chance, "p2")) {
            const ex = rollInt(fx.min, fx.max);
            hp1 = Math.max(0, hp1 - ex);
            appendLog(`✦ <strong>Синергия (враг, Зенин):</strong> дополнительно <strong>${ex}</strong>.`, "synergy");
            updateHpBars();
          }
        }
        if (fx.kind === "force_enemy_strike" && (act === "strike" || act === "technique")) {
          if (synergyRollSuccess(fx.chance, "p2")) {
            battleState.forcePlayerStrikeNext = true;
            appendLog(`✦ <strong>Синергия (враг, зал):</strong> сценарий сужается — твой следующий ход только <strong>удар</strong>.`, "synergy");
          }
        }
        if (fx.kind === "mark_enemy_weak" && act === "strike") {

    /** Баланс: шансы синергий и сила механик зависят от сложности (игрок слегка сильнее на лёгкой, враг — на экстриме). */
    function getBattleBalance() {
      const id = difficultyId || "normal";
      if (id === "easy")
        return { synP1: 1.12, synP2: 0.88, mechDefP1: 1.1, mechDefP2: 0.9, flatP1: 1.06, flatP2: 0.94 };
      if (id === "hard")
        return { synP1: 0.9, synP2: 1.08, mechDefP1: 0.92, mechDefP2: 1.08, flatP1: 0.94, flatP2: 1.08 };
      if (id === "extreme")
        return { synP1: 0.82, synP2: 1.15, mechDefP1: 0.85, mechDefP2: 1.12, flatP1: 0.88, flatP2: 1.14 };
      return { synP1: 1, synP2: 1, mechDefP1: 1, mechDefP2: 1, flatP1: 1, flatP2: 1 };
    }

    function synergyRollSuccess(baseChance, side) {
      const b = getBattleBalance();
      const m = side === "p2" ? b.synP2 : b.synP1;
      return Math.random() < Math.min(0.92, Math.max(0.03, baseChance * m));
    }

    function scaleFlatBonus(amount, side) {
      const b = getBattleBalance();
      const m = side === "p2" ? b.flatP2 : b.flatP1;
      return Math.max(0, Math.floor(amount * m));
    }

    function pickEnemyAct() {
      const d = getDifficulty();
      const pool = [];
      for (let i = 0; i < d.enemyStrikeWeight; i++) pool.push("strike");
      for (let i = 0; i < d.enemyTechWeight; i++) pool.push("technique");
      for (let i = 0; i < d.enemyDefendWeight; i++) pool.push("defend");
      return pool[Math.floor(Math.random() * pool.length)];
    }

    /** Снижает входящий урон с учётом защиты персонажа (def). */
    function applyIncomingDefense(raw, defender) {
      const dr = Math.min(0.2, (defender.def || 10) * 0.0065);
      return Math.max(1, Math.floor(raw * (1 - dr)));
    }

    /** Снижает исходящий урон по цели с высоким def. */
    function applyTargetArmor(raw, target) {
      const ar = Math.min(0.14, (target.def || 10) * 0.0045);
      return Math.max(1, Math.floor(raw * (1 - ar)));
    }

    function shuffleDomainOpts(pairs) {
      const arr = pairs.map(([text, ok]) => ({ text, ok: !!ok }));
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = arr[i];
        arr[i] = arr[j];
        arr[j] = t;
      }
      return arr;
    }

    function closeDomainModal() {
      const root = document.getElementById("domainModalBody");
      const modal = document.getElementById("domainModal");
      if (root) root.innerHTML = "";
      if (modal) {
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
      }
    }

    function runDomainStepMiniGame(p1, done) {
      const qA = DOMAIN_Q1_BY_ID[p1.id] || DOMAIN_Q1_BY_ID._default;
      const qB = DOMAIN_Q2_POOL[Math.floor(Math.random() * DOMAIN_Q2_POOL.length)];
      const steps = [qA, qB];
      const root = document.getElementById("domainModalBody");
      const modal = document.getElementById("domainModal");
      let idx = 0;
      function fail() {
        closeDomainModal();
        done(false);
      }
      function paint() {
        if (idx >= steps.length) {
          closeDomainModal();
          done(true);
          return;
        }
        const st = steps[idx];
        const opts = shuffleDomainOpts(st.o);
        const title = `${p1.emoji} Расширение домена — ${p1.name}`;
        root.innerHTML = `<h3 id="domainModalTitle">${title}</h3><div class="dm-step">Шаг ${idx + 1} из ${steps.length}</div><p class="dm-text">${st.t}</p><div class="dm-btns">${opts
          .map(
            (x, i) =>
              `<button type="button" class="dm-btn" data-i="${i}" data-ok="${x.ok ? 1 : 0}">${x.text}</button>`,
          )
          .join("")}</div>`;
        root.querySelectorAll(".dm-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            if (btn.getAttribute("data-ok") === "1") {
              idx += 1;
              paint();
            } else fail();
          });
        });
      }
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      paint();
    }

    let idx2 = 0;
    let p1 = null;
    let p2 = null;
    let hp1, hp2, max1, max2;
    let battleOver = false;
    let defendStreak = 0;
    let prevHp1 = 0;
    let prevHp2 = 0;
    let autoBattleTimer = null;
    let mahoCutsceneTimers = [];
    let heianCutsceneTimers = [];
    let moduloCutsceneTimers = [];

    function updateBattleBenchs() {
      const el1 = document.getElementById("bench1");
      const el2 = document.getElementById("bench2");
      if (!el1 || !el2) return;
      const rest1 = team1.slice(idx1 + 1);
      const rest2 = team2.slice(idx2 + 1);
      el1.innerHTML = rest1.length
        ? `<strong>Запас:</strong> ${rest1.map((c) => `${c.emoji} ${charTitleHtml(c)}`).join(" · ")}`
        : "";
      el2.innerHTML = rest2.length
        ? `<strong>Запас:</strong> ${rest2.map((c) => `${c.emoji} ${charTitleHtml(c)}`).join(" · ")}`
        : "";
    }

    function trySwapTeam1() {
      if (!team1.length || idx1 >= team1.length - 1) return false;
      idx1 += 1;
      p1 = team1[idx1];
      max1 = p1.hp;
      hp1 = max1;
      defendStreak = 0;
      prevHp1 = hp1;
      document.getElementById("e1").textContent = p1.emoji;
      applyCharTitleEl(document.getElementById("n1"), p1);
      setFighterCharAttrs();
      appendLog(`Замена — за команду 1 на поле выходит ${charTitleHtml(p1)}.`, "system");
      battleState.raidArmorActive = (synergyP1.fx || []).some((f) => f.kind === "raid_armor_ignore");
      battleState.yujiStrikes = 0;
      updateBattleBenchs();
      updateHpBars();
      return true;
    }

    function trySwapTeam2() {
      if (!team2.length || idx2 >= team2.length - 1) return false;
      const d = getDifficulty();
      idx2 += 1;
      p2 = team2[idx2];
      max2 = Math.max(1, Math.round(p2.hp * d.enemyHpMult));
      hp2 = max2;
      defendStreak = 0;
      prevHp2 = hp2;
      document.getElementById("e2").textContent = p2.emoji;
      applyCharTitleEl(document.getElementById("n2"), p2);
      setFighterCharAttrs();
      appendLog(`Замена — за команду 2 на поле выходит ${charTitleHtml(p2)}.`, "system");
      battleState.raidArmorEnemyActive = (synergyP2.fx || []).some((f) => f.kind === "raid_armor_ignore");
      updateBattleBenchs();
      updateHpBars();
      return true;
    }

    const roster1 = document.getElementById("roster1");
    const roster2 = document.getElementById("roster2");
    const label1 = document.getElementById("label1");
    const label2 = document.getElementById("label2");
    const startBtn = document.getElementById("start");
    const setupEl = document.getElementById("setup");
    const battleEl = document.getElementById("battle");
    const logEl = document.getElementById("log");
    const fxOverlay = document.getElementById("fxOverlay");

    function clearFxOverlay() {
      fxOverlay.className = "fx-overlay";
    }

    function triggerFxOverlay(cls, ms) {
      clearFxOverlay();
      void fxOverlay.offsetWidth;
      fxOverlay.classList.add(cls);
      setTimeout(clearFxOverlay, ms);
    }

    function triggerScreenShake() {
      document.body.classList.add("is-shake");
      setTimeout(() => document.body.classList.remove("is-shake"), 450);
    }

    function clearAutoBattleTimer() {
      if (autoBattleTimer !== null) {
        clearTimeout(autoBattleTimer);
        autoBattleTimer = null;
      }
    }

    function scheduleAutoBattleStep() {
      clearAutoBattleTimer();
      const autoEl = document.getElementById("autoBattle");
      if (!autoEl || !autoEl.checked || battleOver || !battleEl.classList.contains("active")) return;
      autoBattleTimer = setTimeout(() => {
        autoBattleTimer = null;
        runAutoBattleAction();
      }, 520);
    }

    function pickAutoBattleAction() {
      const hp1r = hp1 / Math.max(1, max1);
      const hp2r = hp2 / Math.max(1, max2);
      let wStrike = 30;
      let wTech = 28;
      let wDef = 16;
      let wDomain = 14;
      if (hp1r < 0.38) {
        wStrike -= 8;
        wTech -= 4;
        wDef += 20;
        wDomain -= 8;
      }
      if (hp2r < 0.25) {
        wStrike += 10;
        wTech += 8;
        wDomain += 10;
        wDef = Math.max(6, wDef - 12);
      }
      return weightedPick([
        { act: "strike", w: Math.max(10, wStrike) },
        { act: "technique", w: Math.max(10, wTech) },
        { act: "defend", w: Math.max(8, wDef) },
        { act: "domain", w: Math.max(8, wDomain) },
      ]);
    }

    function runAutoBattleAction() {
      const autoEl = document.getElementById("autoBattle");
      if (!autoEl || !autoEl.checked || battleOver || !battleEl.classList.contains("active")) return;
      if (battleState.skipPlayerTurn) {
        battleState.skipPlayerTurn = false;
        appendLog(`<span class="system">Пропуск хода — сорванный темп.</span>`, "system");
        enemyTurn();
        return;
      }
      let act = pickAutoBattleAction();
      if (battleState.forcePlayerStrikeNext) act = "strike";
      if (act === "domain") {
        const d = getDifficulty();
        const success = Math.random() < Math.min(0.92, d.domainSuccessChance + synergyP1.domainCh);
        applyPlayerDomainHit(success);
        return;
      }
      const btn = document.querySelector(`#actions .act-btn[data-act="${act}"]`);
      if (btn && !btn.disabled) btn.click();
    }

    function renderRosters() {
      roster1.innerHTML = "";
      roster2.innerHTML = "";
      const marks = ["①", "②", "③"];
      CHARS.filter(charMatchesRosterFilter).forEach((c) => {
        const i1 = team1Pick.indexOf(c.id);
        const i2 = team2Pick.indexOf(c.id);

        const b1 = document.createElement("button");
        b1.type = "button";
        b1.className =
          "char-btn" + (c.elite ? " char-btn--elite" : "") + (i1 >= 0 ? " p1-pick" : "");
        b1.innerHTML =
          (i1 >= 0 ? `<span class="slot-mark">${marks[i1]}</span>` : "") +
          `<span class="char-btn__emoji" aria-hidden="true">${c.emoji}</span><span class="char-title char-title--${c.id}">${c.name}</span>`;
        setCharButtonRosterTitle(b1, c);
        b1.disabled = team2Pick.includes(c.id);
        b1.addEventListener("click", () => {
          const j = team1Pick.indexOf(c.id);
          if (j >= 0) team1Pick.splice(j, 1);
          else if (team1Pick.length < 3) team1Pick.push(c.id);
          else team1Pick[2] = c.id;
          renderRosters();
          updateLabels();
        });
        roster1.appendChild(b1);

        const b2 = document.createElement("button");
        b2.type = "button";
        b2.className =
          "char-btn" + (c.elite ? " char-btn--elite" : "") + (i2 >= 0 ? " p2-pick" : "");
        b2.innerHTML =
          (i2 >= 0 ? `<span class="slot-mark">${marks[i2]}</span>` : "") +
          `<span class="char-btn__emoji" aria-hidden="true">${c.emoji}</span><span class="char-title char-title--${c.id}">${c.name}</span>`;
        setCharButtonRosterTitle(b2, c);
        b2.disabled = team1Pick.includes(c.id);
        b2.addEventListener("click", () => {
          const j = team2Pick.indexOf(c.id);
          if (j >= 0) team2Pick.splice(j, 1);
          else if (team2Pick.length < 3) team2Pick.push(c.id);
          else team2Pick[2] = c.id;
          renderRosters();
          updateLabels();
        });
        roster2.appendChild(b2);
      });
    }

    function updateLabels() {
      label1.innerHTML = formatTeamPickLabelHtml(team1Pick);
      label2.innerHTML = formatTeamPickLabelHtml(team2Pick);
      startBtn.disabled = !(team1Pick.length >= 1 && team2Pick.length >= 1);
    }

    function appendLog(html, variant) {
      const line = document.createElement("div");
      line.className = "log-line" + (variant ? " log-line--" + variant : "");
      line.innerHTML = html;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function charTitleHtml(c) {
      if (!c || !c.id) return "";
      return `<span class="char-title char-title--${c.id}">${c.name}</span>`;
    }

    function htmlPlayerTurnHead() {
      return `<span class="turn">${charTitleHtml(p1)}<span class="turn-meta"> · твой ход</span></span>`;
    }

    function htmlEnemyTurnHead() {
      return `<span class="enemy">${charTitleHtml(p2)}<span class="enemy-meta"> · ход</span></span>`;
    }

    function applyCharTitleEl(el, c) {
      if (!el || !c) return;
      el.textContent = c.name;
      el.className = "char-title char-title--" + c.id;
    }

    function setFighterCharAttrs() {
      const el1 = document.getElementById("fighter1");
      const el2 = document.getElementById("fighter2");
      if (el1 && p1) el1.setAttribute("data-active-char", p1.id);
      if (el2 && p2) el2.setAttribute("data-active-char", p2.id);
    }

    function formatTeamPickLabelHtml(ids) {
      if (!ids.length) return "—";
      return ids
        .map((id) => {
          const ch = CHARS.find((x) => x.id === id);
          return ch ? charTitleHtml(ch) : id;
        })
        .join(`<span class="team-pick-sep"> · </span>`);
    }

    function formatTeamListHtml(teamArr) {
      return teamArr.map((c) => `${c.emoji} ${charTitleHtml(c)}`).join(", ");
    }

    function roll(base, variance, varianceOverride) {
      const v = varianceOverride !== undefined ? varianceOverride : (variance ?? 4);
      const b = Math.max(0, base);
      return Math.max(1, b + Math.floor(Math.random() * (v * 2 + 1)) - v);
    }

    /** Механики: не «×урон», а отдельные добои, отмены, хил, срывы (по id бойца). */
    function mechDomainExtraFlat(p) {
      if (!p) return 0;
      if (p.id === "ryu") return rollInt(0, 5);
      if (p.id === "hakari" && Math.random() < 0.35) return rollInt(3, 11);
      if (p.id === "jogo" && Math.random() < 0.25) return rollInt(2, 8);
      return 0;
    }

    function mechFlatChipVsTarget(attacker, target, phase) {
      if (!attacker) return 0;
      const id = attacker.id;
      if (phase === "domain_miss" && id === "takaba" && Math.random() < 0.22) return rollInt(2, 9);
      if (phase === "domain" && id === "geto" && Math.random() < 0.2) return rollInt(3, 10);
      return 0;
    }

    function mechBonusDamageOnHit(attacker, act, dmgDealt) {
      if (!attacker) return 0;
      let add = 0;
      const id = attacker.id;
      if ((id === "mahito" || id === "mahito_true") && act === "technique") add += rollInt(3, 9);
      if (id === "nobara" && act === "strike" && Math.random() < 0.34) add += rollInt(2, 11);
      if (id === "jogo" && act === "technique" && Math.random() < 0.36) add += rollInt(3, 13);
      if (id === "kurourushi" && act === "technique") add += rollInt(2, 8);
      if (id === "locust_guy" && act === "technique") add += rollInt(2, 9);
      if (id === "mei_mei" && act === "strike" && Math.random() < 0.18) add += rollInt(4, 14);
      if (id === "iori_hazenoki" && (act === "technique" || act === "strike")) add += rollInt(2, 10);
      if (id === "reggie" && act === "technique" && Math.random() < 0.2) add += rollInt(3, 12);
      if (id === "kashimo" && act === "technique" && Math.random() < 0.25) add += rollInt(3, 12);
      if (id === "choso" && act === "technique") add += rollInt(1, 7);
      if (id === "yuji" && act === "strike") {
        if (attacker === p1) {
          battleState.yujiStrikes = (battleState.yujiStrikes || 0) + 1;
          if (battleState.yujiStrikes % 4 === 0) add += rollInt(8, 22);
        } else {
          battleState.yujiEnemyStrikes = (battleState.yujiEnemyStrikes || 0) + 1;
          if (battleState.yujiEnemyStrikes % 4 === 0) add += rollInt(8, 22);
        }
      }
      if (id === "megumi" && act === "technique" && Math.random() < 0.22) add += rollInt(3, 11);
      if (id === "kenjaku" && act === "technique" && Math.random() < 0.18) add += rollInt(4, 14);
      if (id === "yuki" && act === "strike" && Math.random() < 0.2) add += rollInt(4, 14);
      if (id === "modulo_yuji" && act !== "defend") {
        if (attacker === p1 && (battleState.playerMoves || 0) > 0 && battleState.playerMoves % 3 === 0) add += rollInt(5, 18);
        if (attacker === p2 && (battleState.enemyMoves || 0) > 0 && battleState.enemyMoves % 3 === 0) add += rollInt(5, 18);
      }
      return scaleFlatBonus(add, attacker === p1 ? "p1" : "p2");
    }

    function mechHealOnDefend(defender) {
      if (!defender) return 0;
      const id = defender.id;
      if (id === "yuta") return rollInt(6, 16);
      if (id === "sukuna" && Math.random() < 0.45) return rollInt(5, 15);
      if (id === "panda" && Math.random() < 0.4) return rollInt(4, 12);
      if (id === "miwa" && Math.random() < 0.35) return rollInt(3, 10);
      return 0;
    }

    function mechMaybeNegateOrShaveIncoming(defender, dmg) {
      if (!defender || dmg <= 0) return dmg;
      const b = getBattleBalance();
      const s = defender === p1 ? b.mechDefP1 : b.mechDefP2;
      const id = defender.id;
      if (id === "gojo" && Math.random() < Math.min(0.45, 0.22 * s)) {
        appendLog(`<span class="mech-proc">∞ Бесконечность — удар не достигает тела.</span>`, "mech-proc");
        return 0;
      }
      if (id === "megumi" && Math.random() < Math.min(0.32, 0.14 * s)) {
        appendLog(`<span class="mech-proc">Тень подхватила удар вместо тебя.</span>`, "mech-proc");
        return 0;
      }
      if (id === "uro" && Math.random() < Math.min(0.34, 0.16 * s)) {
        appendLog(`<span class="mech-proc">Небо искривлено — траектория срывается.</span>`, "mech-proc");
        return 0;
      }
      if (id === "momo" && Math.random() < Math.min(0.28, 0.12 * s)) {
        appendLog(`<span class="mech-proc">Уход на метле — удар в пустоту.</span>`, "mech-proc");
        return 0;
      }
      if (id === "toji" && Math.random() < Math.min(0.3, 0.16 * s)) {
        const cut = rollInt(4, 14);
        return Math.max(1, dmg - cut);
      }
      if (id === "mechamaru" && Math.random() < Math.min(0.38, 0.2 * s)) {
        return Math.max(1, dmg - rollInt(5, 16));
      }
      if (id === "hanami" && Math.random() < Math.min(0.34, 0.18 * s)) {
        return Math.max(1, dmg - rollInt(3, 12));
      }
      if (id === "miwa" && Math.random() < Math.min(0.26, 0.12 * s)) {
        return Math.max(1, Math.floor(dmg * 0.55));
      }
      if (id === "dhruv" && Math.random() < Math.min(0.3, 0.14 * s)) {
        return Math.max(1, Math.floor(dmg * 0.62));
      }
      return dmg;
    }

    function applyPlayerDomainHit(success) {
      if (battleOver || !p1 || !p2) return;
      let ok = !!success;
      if (!ok) {
        const fxR = (synergyP1.fx || []).find((f) => f.kind === "domain_risk_reroll");
        if (fxR && !battleState.domainRerollUsed && fxR.once && synergyRollSuccess(fxR.chance, "p1")) {
          battleState.domainRerollUsed = true;
          ok = true;
          appendLog(`✦ <strong>Синергия (отбор):</strong> пересдача — домен цепляется!`, "synergy");
        }
      }
      const d = getDifficulty();
      let raw;
      let dmg;
      let msg;
      let logVariant;
      const domFlat = mechDomainExtraFlat(p1);
      if (ok) {
        raw = roll(Math.floor(22 * ((p1.tech + p1.atk) / 20)), null, d.rollVarPlayer);
        raw = Math.max(1, Math.floor(raw * d.playerDamageMult) + domFlat);
        dmg = applyTargetArmor(raw, p2);
        dmg = Math.max(1, dmg + mechFlatChipVsTarget(p1, p2, "domain"));
        msg = `${htmlPlayerTurnHead()} ${p1.domainHit} Урон: ${dmg}.`;
        logVariant = "domain";
        triggerFxOverlay("is-domain", 680);
        triggerScreenShake();
      } else {
        raw = roll(4, null, d.rollVarPlayer);
        raw = Math.max(1, Math.floor(raw * d.playerDamageMult));
        dmg = applyTargetArmor(raw, p2);
        dmg = Math.max(1, dmg + mechFlatChipVsTarget(p1, p2, "domain_miss"));
        msg = `${htmlPlayerTurnHead()} ${p1.domainMiss} Слабый зацеп: ${dmg}.`;
        logVariant = "domain-miss";
      }
      if (battleState.nextPlayerOutgoingFactor < 0.999) {
        dmg = Math.max(0, Math.floor(dmg * battleState.nextPlayerOutgoingFactor));
        battleState.nextPlayerOutgoingFactor = 1;
      }
      dmg = mechMaybeNegateOrShaveIncoming(p2, dmg);
      if (ok) {
        msg = `${htmlPlayerTurnHead()} ${p1.domainHit} Урон: ${dmg}.`;
      } else {
        msg = `${htmlPlayerTurnHead()} ${p1.domainMiss} Слабый зацеп: ${dmg}.`;
      }
      hp2 = Math.max(0, hp2 - dmg);
      if (ok) {
        const ritual = (synergyP1.fx || []).find((f) => f.kind === "ritual_domain_extra");
        if (ritual && ritual.once && !battleState.ritualDomainUsed) {
          battleState.ritualDomainUsed = true;
          const ex = rollInt(ritual.min, ritual.max);
          hp2 = Math.max(0, hp2 - ex);
          appendLog(`✦ <strong>Синергия (школа):</strong> ритуальный резонанс — ещё <strong>${ex}</strong>.`, "synergy");
        }
        const curse = (synergyP1.fx || []).find((f) => f.kind === "curse_mark_after_domain");
        if (curse) {
          battleState.nextEnemyOutgoingFactor = Math.min(battleState.nextEnemyOutgoingFactor, curse.factor);
          appendLog(`✦ <strong>Синергия (мозг/Гето):</strong> проклятая метка — следующий удар врага слабее.`, "synergy");
        }
      }
      appendLog(msg, logVariant);
      battleState.playerMoves = (battleState.playerMoves || 0) + 1;
      updateHpBars();
      checkEnd();
      if (!battleOver) enemyTurn();
    }

    function enemyTurn() {
      if (battleOver || !p1 || !p2) return;
      if (battleState.skipEnemyTurn) {
        battleState.skipEnemyTurn = false;
        appendLog(`<span class="enemy">Противник не успевает ответить — сбитый темп.</span>`, "system");
        if (!battleOver) scheduleAutoBattleStep();
        return;
      }
      battleState.enemyMoves = (battleState.enemyMoves || 0) + 1;
      const d = getDifficulty();
      let act;
      if (battleState.forceEnemyStrikeNext) {
        battleState.forceEnemyStrikeNext = false;
        act = "strike";
      } else {
        act = pickEnemyAct();
      }
      const mult = act === "technique" ? p2.tech / 10 : act === "strike" ? p2.atk / 10 : 0;
      let dmg = 0;
      let line = "";

      if (act === "defend") {
        line = `${htmlEnemyTurnHead()} ${p2.defendLine}`;
        appendLog(line, "enemy");
        const hDef = mechHealOnDefend(p2);
        if (hDef > 0) {
          hp2 = Math.min(max2, hp2 + hDef);
          appendLog(`${charTitleHtml(p2)}<span class="enemy-heal-meta"> · восстановление</span> +<strong>${hDef}</strong> HP.`, "enemy");
        }
        runSynergyHooksEnemyAfterDefend();
        tryTokyoCoverHealEnemy();
        updateHpBars();
        if (!battleOver) scheduleAutoBattleStep();
        return;
      }

      let critLine = "";
      const m2c = mechCritAdd(p2);
      const pickLine = act === "strike" ? pick(p2.strikePool) : pick(p2.techPool);
      if (act === "strike") {
        dmg = roll(Math.floor(8 * mult), null, d.rollVarEnemy);
        const crit = Math.random() < Math.min(0.85, d.enemyCritChance + synergyP2.crit + m2c);
        if (crit) {
          dmg = Math.floor(dmg * 1.45);
          critLine = `<span class="crit">Крит!</span> `;
          triggerScreenShake();
          triggerFxOverlay("is-crit", 540);
        }
        const raidFx2 = (synergyP2.fx || []).find((f) => f.kind === "raid_armor_ignore");
        if (raidFx2 && battleState.raidArmorEnemyActive) {
          battleState.raidArmorEnemyActive = false;
          dmg = Math.floor(dmg * (1 + raidFx2.frac));
          appendLog(`✦ <strong>Синергия (враг, рейд):</strong> первый удар бойца пробивает защиту.`, "synergy");
        }
        dmg = Math.max(1, Math.floor(dmg * synergyP2.strike));
        if (battleState.tagEnemyStrikeBonus > 0) {
          dmg += battleState.tagEnemyStrikeBonus;
          appendLog(
            `✦ <strong>Синергия (враг):</strong> бонус после защиты +<strong>${battleState.tagEnemyStrikeBonus}</strong>.`,
            "synergy",
          );
          battleState.tagEnemyStrikeBonus = 0;
        }
        dmg += mechBonusDamageOnHit(p2, "strike", dmg);
      } else {
        dmg = roll(Math.floor(7 * mult), null, d.rollVarEnemy);
        if (Math.random() < d.enemyTechBonusChance) dmg = Math.floor(dmg * 1.35);
        dmg = Math.max(1, Math.floor(dmg * synergyP2.tech * synergyP2.domainDmg));
        dmg += mechBonusDamageOnHit(p2, "technique", dmg);
      }

      dmg = Math.max(1, Math.floor(dmg * d.enemyDamageMult));
      dmg = applyIncomingDefense(dmg, p1);
      dmg = mechMaybeNegateOrShaveIncoming(p1, dmg);
      if (dmg <= 0) {
        appendLog(
          `${critLine}${htmlEnemyTurnHead()} ${pickLine} — не проходит (<strong>0</strong> урона).`,
          "enemy",
        );
        tryTokyoCoverHeal();
        tryTokyoCoverHealEnemy();
        updateHpBars();
        checkEnd();
        if (!battleOver) scheduleAutoBattleStep();
        return;
      }
      if (battleState.nextEnemyOutgoingFactor < 0.999) {
        dmg = Math.max(1, Math.floor(dmg * battleState.nextEnemyOutgoingFactor));
        battleState.nextEnemyOutgoingFactor = 1;
      }
      const mit = Math.min(0.78, d.defendMitigation + synergyP1.defEx);
      const reduced = defendStreak > 0 ? Math.max(1, Math.floor(dmg * (1 - mit))) : dmg;
      line =
        critLine +
        `${htmlEnemyTurnHead()} ${pickLine} Урон: <strong>${reduced}</strong>`;
      if (defendStreak > 0) line += ` (защита снижает с ${dmg} до ${reduced})`;
      hp1 = Math.max(0, hp1 - reduced);
      defendStreak = 0;
      let enemyLogVar = "enemy";
      if (act === "strike" && line.includes("Крит")) enemyLogVar = "crit";
      appendLog(line, enemyLogVar);
      tryTokyoCoverHeal();
      tryTokyoCoverHealEnemy();
      runSynergyHooksEnemyAfterDamage(act, reduced);
      if (act === "technique") tryKyotoPulseEnemy("technique");
      updateHpBars();
      checkEnd();
      if (!battleOver) scheduleAutoBattleStep();
    }

    function updateHpBars() {
      const el1 = document.getElementById("hp1b");
      const el2 = document.getElementById("hp2b");
      const f1 = document.getElementById("fighter1");
      const f2 = document.getElementById("fighter2");

      document.getElementById("hp1t").textContent = `${hp1} / ${max1}`;
      document.getElementById("hp2t").textContent = `${hp2} / ${max2}`;
      el1.style.width = `${(hp1 / max1) * 100}%`;
      el2.style.width = `${(hp2 / max2) * 100}%`;

      if (hp1 < prevHp1) {
        el1.classList.remove("hp-hit");
        void el1.offsetWidth;
        el1.classList.add("hp-hit");
        f1.classList.remove("is-pulse");
        void f1.offsetWidth;
        f1.classList.add("is-pulse");
        triggerFxOverlay("is-hit-p1", 420);
      }
      if (hp2 < prevHp2) {
        el2.classList.remove("hp-hit");
        void el2.offsetWidth;
        el2.classList.add("hp-hit");
        f2.classList.remove("is-pulse");
        void f2.offsetWidth;
        f2.classList.add("is-pulse");
        triggerFxOverlay("is-hit-p2", 420);
      }
      prevHp1 = hp1;
      prevHp2 = hp2;
    }

    function checkEnd() {
      if (hp1 <= 0) {
        if (trySwapTeam1()) return;
        battleOver = true;
        clearAutoBattleTimer();
        appendLog(`<span class="end">Победа команды 2 (${formatTeamListHtml(team2)})! Ты проиграл.</span>`, "end");
        setActionsDisabled(true);
        return;
      }
      if (hp2 <= 0) {
        if (trySwapTeam2()) return;
        battleOver = true;
        clearAutoBattleTimer();
        appendLog(`<span class="end">Победа команды 1 (${formatTeamListHtml(team1)})! Команда противника повержена.</span>`, "end");
        setActionsDisabled(true);
      }
    }

    function setActionsDisabled(dis) {
      document.querySelectorAll(".act-btn").forEach((b) => { b.disabled = dis; });
    }

    function closeMahoragaCutscene() {

      if (el) {
        el.classList.remove("is-open");

      }

        btn.hidden = true;
        btn.onclick = null;

    function showHeianCutscene(onDone, skipReenableActions) {
      const el = document.getElementById("heianCutscene");
      const textEl = document.getElementById("heianCutsceneText");
      const btn = document.getElementById("heianCutsceneBtn");
      if (!el || !textEl || !btn) {
        onDone();
        return;
      }
      closeHeianCutscene();
      const lines = [
        "Воздух сухой — как в старой столице. Ты ещё не сделал ход, а CE уже пахнет кровью и ладаном.",
        "Это не «тот же Сукуна в другой одежде». Эпоха Хэйан не спрашивала разрешения — она просто забирала поле.",
        "Четыре руки, взгляд без скидки: «Святилище» здесь не театр, а приговор, вырезанный в пространстве.",
        "Ворота ⛩ в голове скрипят от натяжения. Следующий кадр — уже бой: кто первым нарушит тишину.",
      ];
      textEl.innerHTML = "";
      btn.hidden = true;
      el.classList.add("is-open");
      el.setAttribute("aria-hidden", "false");
      setActionsDisabled(true);
      let i = 0;
      function tick() {
        if (i >= lines.length) {
          btn.hidden = false;
          return;
        }
        const p = document.createElement("p");
        p.className = "heian-cutscene__line";
        p.textContent = lines[i];
        textEl.appendChild(p);
        i += 1;
        if (i < lines.length) {
          heianCutsceneTimers.push(setTimeout(tick, 560));
        } else {
          heianCutsceneTimers.push(
            setTimeout(() => {
              btn.hidden = false;
            }, 280),
          );
        }
      }
      tick();
      btn.onclick = () => {
        closeHeianCutscene();
        if (!skipReenableActions) setActionsDisabled(false);
        onDone();
      };
    }

    function startBattle() {
      if (team1Pick.length < 1 || team2Pick.length < 1) return;
      team1 = team1Pick.map((id) => CHARS.find((x) => x.id === id)).filter(Boolean);
      team2 = team2Pick.map((id) => CHARS.find((x) => x.id === id)).filter(Boolean);
      if (!team1.length || !team2.length) return;
      idx1 = 0;
      idx2 = 0;
      p1 = team1[0];
      p2 = team2[0];
      const d = getDifficulty();
      max1 = p1.hp;
      max2 = Math.max(1, Math.round(p2.hp * d.enemyHpMult));
      hp1 = max1;
      hp2 = max2;
      prevHp1 = hp1;
      prevHp2 = hp2;
      battleOver = false;
      defendStreak = 0;
      resetBattleState();
      setupEl.style.display = "none";
      battleEl.classList.add("active");
      document.getElementById("e1").textContent = p1.emoji;
      document.getElementById("e2").textContent = p2.emoji;
      applyCharTitleEl(document.getElementById("n1"), p1);
      applyCharTitleEl(document.getElementById("n2"), p2);
      setFighterCharAttrs();
      logEl.innerHTML = "";

      const hasMahoraga = team1Pick.includes("mahoraga") || team2Pick.includes("mahoraga");
      const hasHeianSukuna =
        team1Pick.includes("heian_sukuna") || team2Pick.includes("heian_sukuna");
      const hasModuloYuji =
        team1Pick.includes("modulo_yuji") || team2Pick.includes("modulo_yuji");

      function beginBattleLogsAndUi() {
        appendLog(
          `Командный бой: <strong>${formatTeamListHtml(team1)}</strong> против <strong class="red">${formatTeamListHtml(team2)}</strong>. Сложность: <strong>${d.label}</strong> (HP активного врага ${max2}).`,
          "system",
        );
        synergyP1 = mergeSynergies(findSynergyMatches(team1Pick));
        synergyP2 = mergeSynergies(findSynergyMatches(team2Pick));
        battleState.raidArmorActive = (synergyP1.fx || []).some((f) => f.kind === "raid_armor_ignore");
        battleState.raidArmorEnemyActive = (synergyP2.fx || []).some((f) => f.kind === "raid_armor_ignore");
        renderSynergyHud();
        runSynergyHooksBattleStart();
        runSynergyHooksBattleStartEnemy();
        synergyP1.active.forEach((m) => {
          appendLog(`✦ <strong>Связка (ты):</strong> «${m.name}» — ${m.blurb}`, "synergy");
        });
        synergyP2.active.forEach((m) => {
          appendLog(`✦ <strong>Связка (враг):</strong> «${m.name}» — ${m.blurb}`, "synergy");
        });
        appendLog("Твой ход — выбери действие.", "system");
        updateBattleBenchs();
        updateHpBars();
        setActionsDisabled(false);
        const autoEl = document.getElementById("autoBattle");
        if (autoEl && autoEl.checked) scheduleAutoBattleStep();
      }

      if (hasMahoraga && hasHeianSukuna && hasModuloYuji) {
        setActionsDisabled(true);
        showMahoragaCutscene(
          () =>
            showHeianCutscene(() => showModuloCutscene(beginBattleLogsAndUi, true), true),
          true,
        );
      } else if (hasMahoraga && hasHeianSukuna) {
        setActionsDisabled(true);
        showMahoragaCutscene(() => showHeianCutscene(beginBattleLogsAndUi), true);
      } else if (hasMahoraga && hasModuloYuji) {
        setActionsDisabled(true);
        showMahoragaCutscene(() => showModuloCutscene(beginBattleLogsAndUi, true), true);
      } else if (hasHeianSukuna && hasModuloYuji) {
        setActionsDisabled(true);
        showHeianCutscene(() => showModuloCutscene(beginBattleLogsAndUi, true), true);
      } else if (hasMahoraga) {
        showMahoragaCutscene(beginBattleLogsAndUi);
      } else if (hasHeianSukuna) {
        showHeianCutscene(beginBattleLogsAndUi);
      } else if (hasModuloYuji) {
        showModuloCutscene(beginBattleLogsAndUi);
      } else {
        beginBattleLogsAndUi();
      }
    }

    document.getElementById("start").addEventListener("click", startBattle);

    document.getElementById("autoBattle").addEventListener("change", (e) => {
      if (!e.target.checked) {
        clearAutoBattleTimer();
        return;
      }
      if (battleEl.classList.contains("active") && !battleOver) scheduleAutoBattleStep();
    });

    document.getElementById("reset").addEventListener("click", () => {
      clearAutoBattleTimer();
      closeMahoragaCutscene();
      closeHeianCutscene();
      closeModuloCutscene();
      setActionsDisabled(false);
      closeDomainModal();
      clearFxOverlay();
      document.body.classList.remove("is-shake");
      battleEl.classList.remove("active");
      setupEl.style.display = "block";
      team1 = [];
      team2 = [];
      idx1 = 0;
      idx2 = 0;
      p1 = null;
      p2 = null;
      synergyP1 = neutralSynergy();
      synergyP2 = neutralSynergy();
      renderSynergyHud();
      renderRosters();
      updateLabels();
    });

    document.getElementById("actions").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-act]");
      if (!btn || battleOver) return;
      clearAutoBattleTimer();
      const act = btn.getAttribute("data-act");
      const d = getDifficulty();
      let dmg = 0;
      let msg = "";

      let logVariant = "turn";
      let raw = 0;

      if (battleState.skipPlayerTurn) {
        battleState.skipPlayerTurn = false;
        appendLog(`<span class="system">Тебя выбивают из темпа — пропуск хода.</span>`, "system");
        if (!battleOver) enemyTurn();
        return;
      }
      if (battleState.forcePlayerStrikeNext && act !== "strike") {
        appendLog(`<span class="system">Сценарий сужен — доступен только удар.</span>`, "system");
        return;
      }
      if (act === "strike" && battleState.forcePlayerStrikeNext) battleState.forcePlayerStrikeNext = false;

      if (act === "strike") {
        battleState.playerMoves = (battleState.playerMoves || 0) + 1;
        raw = roll(Math.floor(9 * (p1.atk / 10)), null, d.rollVarPlayer);
        const raidFx = (synergyP1.fx || []).find((f) => f.kind === "raid_armor_ignore");
        if (raidFx && battleState.raidArmorActive) {
          battleState.raidArmorActive = false;
          raw = Math.floor(raw * (1 + raidFx.frac));
          appendLog(`✦ <strong>Синергия (рейд Зенин):</strong> первый удар после выхода пробивает защиту.`, "synergy");
        }
        if (Math.random() < Math.min(0.88, d.playerCritChance + synergyP1.crit + mechCritAdd(p1))) {
          raw = Math.floor(raw * 1.5);
          msg = `<span class="crit">Критический удар!</span> `;
          logVariant = "crit";
          triggerScreenShake();
          triggerFxOverlay("is-crit", 540);
        }
        raw = Math.max(1, Math.floor(raw * d.playerDamageMult * synergyP1.strike));
        dmg = applyTargetArmor(raw, p2);
        if (battleState.tagStrikeBonus > 0) {
          dmg += battleState.tagStrikeBonus;
          appendLog(`✦ <strong>Синергия:</strong> бонус после защиты +<strong>${battleState.tagStrikeBonus}</strong> к удару.`, "synergy");
          battleState.tagStrikeBonus = 0;
        }
        const add = mechBonusDamageOnHit(p1, "strike", dmg);
        dmg = Math.max(1, dmg + add);
        if (battleState.nextPlayerOutgoingFactor < 0.999) {
          dmg = Math.max(1, Math.floor(dmg * battleState.nextPlayerOutgoingFactor));
          battleState.nextPlayerOutgoingFactor = 1;
        }
        dmg = mechMaybeNegateOrShaveIncoming(p2, dmg);
        if (dmg <= 0) {
          appendLog(
            `${msg}${htmlPlayerTurnHead()} ${pick(p1.strikePool)} — защита цели, <strong>0</strong> урона.`,
            logVariant,
          );
          updateHpBars();
          checkEnd();
          if (!battleOver) enemyTurn();
          return;
        }
        const addNote = add ? ` (+${add} доп.)` : "";
        msg += `${htmlPlayerTurnHead()} ${pick(p1.strikePool)} Урон противнику: <strong>${dmg}</strong>${addNote}`;
      } else if (act === "technique") {
        battleState.playerMoves = (battleState.playerMoves || 0) + 1;
        raw = roll(Math.floor(8 * (p1.tech / 10)), null, d.rollVarPlayer);
        raw = Math.max(1, Math.floor(raw * d.playerDamageMult * synergyP1.tech));
        dmg = applyTargetArmor(raw, p2);
        const add = mechBonusDamageOnHit(p1, "technique", dmg);
        dmg = Math.max(1, dmg + add);
        if (battleState.nextPlayerOutgoingFactor < 0.999) {
          dmg = Math.max(1, Math.floor(dmg * battleState.nextPlayerOutgoingFactor));
          battleState.nextPlayerOutgoingFactor = 1;
        }
        dmg = mechMaybeNegateOrShaveIncoming(p2, dmg);
        if (dmg <= 0) {
          appendLog(
            `${htmlPlayerTurnHead()} ${pick(p1.techPool)} — защита цели, <strong>0</strong> урона.`,
            "turn",
          );
          updateHpBars();
          checkEnd();
          if (!battleOver) enemyTurn();
          return;
        }
        const addNoteT = add ? ` (+${add} доп.)` : "";
        msg = `${htmlPlayerTurnHead()} ${pick(p1.techPool)} Урон: <strong>${dmg}</strong>${addNoteT}`;
        tryKyotoPulse("technique");
      } else if (act === "domain") {
        setActionsDisabled(true);
        runDomainStepMiniGame(p1, (success) => {
          setActionsDisabled(false);
          applyPlayerDomainHit(success);
        });
        return;
      } else if (act === "defend") {
        battleState.playerMoves = (battleState.playerMoves || 0) + 1;
        defendStreak = 1;
        const h = mechHealOnDefend(p1);
        if (h > 0) {
          hp1 = Math.min(max1, hp1 + h);
          appendLog(
            `<span class="turn">${charTitleHtml(p1)}<span class="turn-meta"> · восстановление</span></span> +<strong>${h}</strong> HP.`,
            "turn",
          );
        }
        runSynergyHooksPlayerAfterDefend();
        msg = `${htmlPlayerTurnHead()} ${p1.defendLine} Следующий удар врага ослаблен.`;
        appendLog(msg, "turn");
        updateHpBars();
        if (!battleOver) enemyTurn();
        return;
      }

      hp2 = Math.max(0, hp2 - dmg);
      appendLog(msg, logVariant);
      if (act === "strike" || act === "technique") {
        runSynergyHooksPlayerAfterDamage(act, dmg);
      }
      updateHpBars();
      checkEnd();
      if (!battleOver) {
        enemyTurn();
      }
    });

    document.getElementById("diffRow").addEventListener("click", (e) => {
      const btn = e.target.closest(".diff-btn");
      if (!btn) return;
      const id = btn.getAttribute("data-diff");
      if (!id || !DIFFICULTY[id]) return;
      difficultyId = id;
      document.querySelectorAll(".diff-btn").forEach((b) => b.classList.toggle("is-on", b === btn));
    });

    (function initRosterFilterUi() {
      const row = document.getElementById("rosterFilterTags");
      const toggle = document.getElementById("rosterFilterToggle");
      const panel = document.getElementById("rosterFilterPanel");
      const search = document.getElementById("rosterSearchInput");
      const clearBtn = document.getElementById("rosterFilterClear");
      if (!row || row.dataset.built) return;
      row.dataset.built = "1";
      ROSTER_TAG_DEFS.forEach((def) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "filter-chip";
        b.textContent = def.label;
        b.dataset.tag = def.id;
        b.addEventListener("click", () => {
          if (rosterActiveTagIds.has(def.id)) rosterActiveTagIds.delete(def.id);
          else rosterActiveTagIds.add(def.id);
          b.classList.toggle("is-on", rosterActiveTagIds.has(def.id));
          updateFilterToggleAppearance();
          renderRosters();
        });
        row.appendChild(b);
      });
      if (toggle && panel) {
        toggle.addEventListener("click", () => {
          const open = !panel.classList.contains("is-open");
          panel.classList.toggle("is-open", open);
          toggle.classList.toggle("is-open", open);
          toggle.setAttribute("aria-expanded", open ? "true" : "false");
        });
      }
      if (search) {
        search.addEventListener("input", (e) => {
          rosterSearchNorm = (e.target.value || "").trim().toLowerCase();
          updateFilterToggleAppearance();
          renderRosters();
        });
      }
      if (clearBtn) {
        clearBtn.addEventListener("click", () => {
          rosterActiveTagIds.clear();
          rosterSearchNorm = "";
          if (search) search.value = "";
          row.querySelectorAll(".filter-chip").forEach((c) => c.classList.remove("is-on"));
          updateFilterToggleAppearance();
          renderRosters();
        });
      }
    })();

    renderRosters();
    updateLabels();
    renderSynergyHud();

    const verEl = document.getElementById("appVersion");
    if (verEl) verEl.textContent = `Версия ${APP_VERSION}`;
  </script>
